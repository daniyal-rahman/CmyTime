
# Hyperparameters for STDP
learning_rate: 0.2 # Increased learning rate significantly
tau_plus: 5.0 # Shorter time window for potentiation
tau_minus: 5.0 # Shorter time window for depression
a_plus: 0.1 # Increased amplitude for potentiation
a_minus: 0.1 # Increased amplitude for depression
w_min: 0.0 # Minimum weight
w_max: 1.0 # Maximum weight
reward_threshold: -10.0 # Only rewards above this threshold will have a strong positive effect
reward_strength: 0.5 # Stronger reward modulation
